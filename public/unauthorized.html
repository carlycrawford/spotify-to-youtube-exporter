<!DOCTYPE html>

<head>

  <title>Access Denied</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; margin-bottom: 2rem; }

      text-decoration: underline;

<body>
  <h1>Access Denied</h1>
